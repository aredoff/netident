name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Test
        run: go test -race ./...
      - name: Build CLI
        run: go build -o /dev/null ./cmd/netident/
      - name: Cross-compile
        run: |
          platforms="linux/amd64 linux/arm64 darwin/arm64 windows/amd64 windows/arm64"
          for platform in $platforms; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            echo "Building ${GOOS}/${GOARCH}..."
            GOOS="$GOOS" GOARCH="$GOARCH" go build -o /dev/null ./cmd/netident/
          done
