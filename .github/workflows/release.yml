name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          bin="netident"
          if [ "$GOOS" = "windows" ]; then
            bin="${bin}.exe"
          fi

          go build -trimpath \
            -ldflags "-s -w -X main.version=${version}" \
            -o "${bin}" \
            ./cmd/netident/

          pkg="netident_${version}_${GOOS}_${GOARCH}"
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -czf "${pkg}.tar.gz" "${bin}"
          else
            zip -q "${pkg}.zip" "${bin}"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netident-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            netident_*.tar.gz
            netident_*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum netident_*.tar.gz netident_*.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/netident_*
            dist/SHA256SUMS.txt
          generate_release_notes: true
